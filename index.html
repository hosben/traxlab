      <h1 id="auth-mode-title">Sign in</h1>

      <form id="auth-form" novalidate>
        <div class="auth-field">
          <label for="auth-email">Email</label>
          <input id="auth-email" type="email" placeholder="you@example.com" autocomplete="email" required />
        </div>

        <div class="auth-field">
          <label for="auth-password">Password</label>
          <input id="auth-password" type="password" placeholder="••••••••" autocomplete="current-password" required />
        </div>

        <p id="auth-error" class="auth-message" role="alert"></p>

        <button id="auth-submit" type="submit" class="btn-primary">Sign in</button>
      </form>

      <p class="auth-toggle">
        <span id="auth-toggle-text">Don't have an account? </span>
        <a href="#" id="auth-toggle-link">Sign up</a>
      </p>

    </div>
  </div>

  <!-- ── App screen (shown after login) ────────────────────── -->
  <div id="app-screen" class="hidden">

    <header class="app-header">

      <div class="header-spacer"></div>
      <span id="user-email"></span>
      <button class="btn-signout" id="btn-signout">Sign out</button>
    </header>

    <main class="app-main">

      <!-- Upload drop zone -->
      <div id="dropzone">
        <input id="file-input" type="file" accept=".wav,.aif,.aiff" multiple />
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M12 16.5V9.75m0 0-3 3m3-3 3 3M6.75 19.5a4.5 4.5 0 0 1-1.41-8.775 5.25 5.25 0 0 1 10.338-2.32 5.75 5.75 0 0 1 1.023 11.095"/>
        </svg>
        <p class="dropzone-title">Drop your tracks here</p>
        <p class="dropzone-sub">WAV and AIFF · No size limit</p>
        <label for="file-input" class="btn-pick">Browse files</label>
      </div>

      <!-- Upload queue -->
      <div id="upload-queue" class="hidden"></div>

      <!-- Error line -->
      <p id="library-error" class="library-error"></p>

      <!-- Track list -->
      <div id="track-list-wrap">
        <div class="track-list-header">
          <span>File</span>
          <span>Duration</span>
          <span>BPM</span>
          <span>Key</span>
        </div>
        <div id="track-list"></div>
        <p id="library-empty" class="library-empty hidden">
          No tracks yet — upload your first file above.
        </p>
      </div>

    </main>

  </div>

  <script type="module">
    import { initAuth, signOut } from './js/auth.js'
    import { initUpload }        from './js/upload.js'
    import { initLibrary, addTrackToList } from './js/library.js'

    document.addEventListener('DOMContentLoaded', () => {
      initAuth()
      document.getElementById('btn-signout').addEventListener('click', signOut)
    })

    // Called by auth.js once session is confirmed
    window.__onAppReady = async () => {
      await initLibrary()
      initUpload({ onTrackAdded: addTrackToList })
    }
  </script>

</body>
</html>
